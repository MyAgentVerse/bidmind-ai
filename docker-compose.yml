version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bidmind_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bidmind_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bidmind_network

  # BidMind AI Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bidmind_api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/bidmind_ai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - bidmind_network

volumes:
  postgres_data:
  uploads:

networks:
  bidmind_network:
    driver: bridge
