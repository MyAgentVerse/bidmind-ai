# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(created_at)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "create_date" timestamp
# string value is passed to the constructor of datetime.datetime
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in "create_date"
# (introduced in new alembic.ini templates)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to detect third-party plugins installed as egg files
# this can be used to allow automatic upgrades for third party dialects
# sqlalchemy_module_spec = sqlalchemy
# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = driver://user:password@localhost/dbname
# post_write_hooks defines scripts or Python functions that get executed
# after generating a new revision file

# post_write_hooks =
#
# The purpose of post_write_hooks is to allow specify additional code to be
# written to the revision file.

# The format is:
# post_write_hooks = keyword:modulename

# where modulename is expected to have a function called "run()" with a signature
# similar to this:
#     def run(alembic_config, alembic_script, context):
#         ...

# logging configuration
# the above context object is passed to the logging
# config file. By default, it listens for keys
# 'sqlalchemy.url' and 'script_location'

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
